name: Weekly Keep Alive Call

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  # Allows manual triggering
  workflow_dispatch:

jobs:
  call-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request
        run: |
          curl -X GET "${{ secrets.KEEP_ALIVE_URL }}"
